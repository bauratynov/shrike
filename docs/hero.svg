<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" role="img" aria-labelledby="sht shd">
  <title id="sht">shrike — gadget density heatmap and discovered-gadget list</title>
  <desc  id="shd">
    On the left, a listing of eight ROP gadgets the scanner discovered
    in a demo .text section, each printed as address + mnemonic chain.
    On the right, a heatmap of gadget density across a .text section:
    bright cells are regions with many reachable ret-terminated chains.
  </desc>

  <style><![CDATA[
    .bg     { fill:#0d1117; }
    .panel  { fill:#161b22; stroke:#30363d; }
    .addr   { fill:#f85149; font:12px ui-monospace,Menlo,monospace; }
    .mnemo  { fill:#e6edf3; font:12px ui-monospace,Menlo,monospace; }
    .term   { fill:#f85149; font:bold 12px ui-monospace,Menlo,monospace; }
    .title  { fill:#e6edf3; font:bold 13px ui-monospace,Menlo,monospace; }
    .sub    { fill:#7d8590; font:11px ui-monospace,Menlo,monospace; }
    .badge  { fill:#3fb950; font:bold 12px ui-monospace,Menlo,monospace; }
  ]]></style>

  <!-- heatmap cell shades (6 levels: dim -> bright red) -->
  <defs>
    <rect id="hcA" width="11" height="11" fill="#1f1612"/>
    <rect id="hcB" width="11" height="11" fill="#2a1b18"/>
    <rect id="hcC" width="11" height="11" fill="#3a1f1a"/>
    <rect id="hcD" width="11" height="11" fill="#5a2420"/>
    <rect id="hcE" width="11" height="11" fill="#8a3028"/>
    <rect id="hcF" width="11" height="11" fill="#c53c30"/>
    <rect id="hcG" width="11" height="11" fill="#f85149"/>
  </defs>

  <rect class="bg" width="820" height="320"/>

  <!-- LEFT: gadget list -->
  <text x="20" y="24" class="title">shrike --max-insn 5 /bin/ls</text>
  <text x="20" y="42" class="sub">— discovered gadgets (excerpt) —</text>

  <g transform="translate(20,58)" font-family="ui-monospace,Menlo,monospace" font-size="12">
    <g><text class="addr" x="0" y="14">0x000040a5f8:</text>
       <text class="mnemo" x="118" y="14">pop rdi ; </text>
       <text class="term" x="200" y="14">ret</text></g>
    <g><text class="addr" x="0" y="34">0x000040a6a3:</text>
       <text class="mnemo" x="118" y="34">pop rsi ; pop r15 ; </text>
       <text class="term" x="290" y="34">ret</text></g>
    <g><text class="addr" x="0" y="54">0x000040ac21:</text>
       <text class="mnemo" x="118" y="54">xor rax, rax ; </text>
       <text class="term" x="232" y="54">ret</text></g>
    <g><text class="addr" x="0" y="74">0x000040b17c:</text>
       <text class="mnemo" x="118" y="74">mov rax, rdi ; </text>
       <text class="term" x="232" y="74">ret</text></g>
    <g><text class="addr" x="0" y="94">0x000040b4e0:</text>
       <text class="mnemo" x="118" y="94">add rsp, 0x28 ; </text>
       <text class="term" x="243" y="94">ret</text></g>
    <g><text class="addr" x="0" y="114">0x000040c3a0:</text>
       <text class="mnemo" x="118" y="114">pop rbp ; pop r12 ; </text>
       <text class="term" x="290" y="114">ret</text></g>
    <g><text class="addr" x="0" y="134">0x000040d128:</text>
       <text class="mnemo" x="118" y="134">leave ; </text>
       <text class="term" x="180" y="134">ret</text></g>
    <g><text class="addr" x="0" y="154">0x000040d4fc:</text>
       <text class="mnemo" x="118" y="154">mov rsp, rbp ; </text>
       <text class="term" x="232" y="154">ret</text></g>
    <g><text class="addr" x="0" y="174">0x000040e224:</text>
       <text class="mnemo" x="118" y="174">syscall ; </text>
       <text class="term" x="195" y="174">ret</text></g>
  </g>

  <!-- footer: summary -->
  <g transform="translate(20,260)">
    <rect class="panel" width="420" height="42"/>
    <text x="16" y="18" class="sub">summary</text>
    <text x="16" y="34" class="mnemo">gadgets: </text>
    <text x="90" y="34" class="badge">1 284</text>
    <text x="150" y="34" class="mnemo"> · unique terminators: </text>
    <text x="320" y="34" class="badge">312</text>
  </g>

