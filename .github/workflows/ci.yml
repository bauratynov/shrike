name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build + test (${{ matrix.os }} / ${{ matrix.cc }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        cc: [gcc, clang]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: compiler version
        run: ${{ matrix.cc }} --version
      - name: build
        run: make CC=${{ matrix.cc }}
      - name: unit tests
        run: make test CC=${{ matrix.cc }}
      - name: smoke (audit /bin/ls)
        run: ./shrike --quiet /bin/ls

  integration:
    name: integration (real distro binaries)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: make
      - name: integration
        run: ./tests/integration.sh

  static-analysis:
    name: cppcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: cppcheck
        run: |
          cppcheck --std=c99 --enable=warning,performance,portability \
                   --error-exitcode=1 --quiet \
                   -Iinclude src/ tests/

  install-smoke:
    name: make install + pkg-config
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: DESTDIR staging install (verifies layout only)
        run: |
          make install PREFIX=/usr DESTDIR="$PWD/destdir"
          test -x destdir/usr/bin/shrike
          test -f destdir/usr/lib/libshrike.a
          test -f destdir/usr/lib/pkgconfig/shrike.pc
          test -f destdir/usr/include/shrike/version.h
          test -f destdir/usr/include/shrike/scan.h
          # Shared library + soname + linker symlink all present.
          # Major version-agnostic: passes for libshrike.so.1, .so.2, etc.
          test -f destdir/usr/lib/libshrike.so
          test -L destdir/usr/lib/libshrike.so
          ls destdir/usr/lib/libshrike.so.[0-9]* | grep -v '\.[0-9]*\.[0-9]*$'
          ls destdir/usr/lib/libshrike.so.[0-9]*.[0-9]*.[0-9]*
      - name: soname embedded in the .so
        run: |
          # readelf confirms the dynamic linker sees libshrike.so.<major>.
          so_real=$(ls destdir/usr/lib/libshrike.so.[0-9]*.[0-9]*.[0-9]*)
          readelf -d "$so_real" | grep -E 'SONAME.*libshrike\.so\.[0-9]+'
      - name: PREFIX install into a real path (for pkg-config resolution)
        run: |
          make clean
          make install PREFIX="$PWD/prefix"
      - name: pkg-config resolves
        run: |
          export PKG_CONFIG_PATH="$PWD/prefix/lib/pkgconfig"
          pkg-config --exists shrike
          pkg-config --modversion shrike
          pkg-config --cflags shrike
          pkg-config --libs shrike
      - name: link a tiny consumer dynamically against libshrike.so
        run: |
          export PKG_CONFIG_PATH="$PWD/prefix/lib/pkgconfig"
          cat > /tmp/consumer.c <<'EOF'
          #include <shrike/version.h>
          #include <stdio.h>
          int main(void) {
              printf("%s %s\n", shrike_version_string(),
                     SHRIKE_VERSION_STRING);
              return 0;
          }
          EOF
          # pkg-config --libs reports "-L<libdir> -lshrike"; ld.so
          # picks libshrike.so → libshrike.so.1 at load time.
          cc /tmp/consumer.c $(pkg-config --cflags --libs shrike) \
             -Wl,-rpath,"$PWD/prefix/lib" \
             -o /tmp/consumer
          /tmp/consumer
          # Confirm we actually dynamically linked, not statically.
          ldd /tmp/consumer | grep -E 'libshrike\.so\.[0-9]+'

  regression-fixtures:
    name: regression — per-arch fixtures in expected ranges
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install cross-compilers (best-effort)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              gcc-aarch64-linux-gnu \
              gcc-riscv64-linux-gnu \
              gcc-mingw-w64-x86-64 \
              || true
      - name: build shrike
        run: make
      - name: run regression
        run: bash tests/regression.sh

  cross-arch:
    name: cross-arch matrix (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            cc:   aarch64-linux-gnu-gcc
            pkg:  gcc-aarch64-linux-gnu
          - arch: riscv64
            cc:   riscv64-linux-gnu-gcc
            pkg:  gcc-riscv64-linux-gnu
          - arch: pe-x86_64
            cc:   x86_64-w64-mingw32-gcc
            pkg:  gcc-mingw-w64-x86-64
    steps:
      - uses: actions/checkout@v4
      - name: install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkg }}
      - name: build shrike (native)
        run: make
      - name: compile target for ${{ matrix.arch }}
        run: |
          cat > /tmp/target.c <<'EOF'
          #include <stdio.h>
          int main(int argc, char **argv) {
              (void)argc; (void)argv;
              puts("hello from the target binary");
              return 0;
          }
          EOF
          # mingw bakes an .exe suffix; other gcc cross-compilers don't.
          case "${{ matrix.arch }}" in
              pe-*) TARGET_OUT=/tmp/target.exe ;;
              *)    TARGET_OUT=/tmp/target ;;
          esac
          ${{ matrix.cc }} -O2 -o "$TARGET_OUT" /tmp/target.c
          echo "TARGET_OUT=$TARGET_OUT" >> $GITHUB_ENV
          file "$TARGET_OUT"
      - name: scan with shrike
        run: |
          ./shrike --quiet "$TARGET_OUT"
          n=$(./shrike --quiet "$TARGET_OUT" 2>&1 | grep 'emitted' | \
                awk '{for(i=1;i<=NF;i++)if($i=="emitted")print $(i-1)}')
          echo "${{ matrix.arch }}: $n gadgets emitted"
          if [ -z "$n" ] || [ "$n" -lt 1 ]; then
              echo "FAIL: shrike found no gadgets in the ${{ matrix.arch }} target"
              exit 1
          fi
      - name: scan with --json
        run: |
          ./shrike --json --quiet "$TARGET_OUT" | head -3

  python-wheel:
    name: Python wheel + import smoke
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install build backend
        run: pip install build setuptools wheel
      - name: build wheel
        run: |
          cd python
          python -m build --wheel --outdir dist/
          ls dist/
      - name: smoke — module imports without binary present
        run: |
          cd python
          pip install dist/*.whl
          python tests/test_import.py

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: sanitized build + unit tests
        run: |
          make clean
          SAN_CFLAGS="-std=c99 -Wall -Wextra -O1 -g -Iinclude -D_GNU_SOURCE \
                      -fsanitize=address,undefined -fno-omit-frame-pointer"
          make CC=clang CFLAGS="$SAN_CFLAGS" \
               LDFLAGS="-fsanitize=address,undefined"
          make -C tests run CC=clang \
               CFLAGS="-std=c99 -Wall -Wextra -O1 -g -I../include \
                       -fsanitize=address,undefined -fno-omit-frame-pointer"
